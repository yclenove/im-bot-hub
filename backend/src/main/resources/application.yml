# 默认 profile：local（本机 MySQL 127.0.0.1:3306，详见 application-local.yml）
# Default profile: local — see application-local.yml for host/port/credentials
spring:
  profiles:
    active: local
  application:
    name: im-bot-hub
  datasource:
    # 未使用 profile 时仍有效；使用 local 时以 application-local.yml 为准覆盖 url/账号
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # 默认避开 8080，减少与本机其它服务冲突；生产可由 spring.config / 环境变量覆盖
  port: 18089

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
      - https://*.trycloudflare.com
  security:
    admin:
      username: admin
      password: change-me
  telegram:
    api-base: https://api.telegram.org
    # 一键注册 Webhook 时的默认公网基址（无末尾 /）；留空则必须在管理端每次填写穿透域名
    public-base-url: ""
    # 出站访问 api.telegram.org 的 HTTP 代理（本机 v2rayN HTTP 口多为 10809）；详见 application-local.yml
    outbound-proxy:
      host: ""
      port: 0
  rate-limit:
    capacity: 30
    refill-per-minute: 30
  encryption:
    # 32-byte key Base64; leave empty to store datasource passwords as plain (dev only)
    secret-key-base64: ""

# OpenAPI 使用 SpringDoc 默认路径 /v3/api-docs（须与 SecurityConfig 放行、Nginx /v3/ 反代一致）
# Swagger UI 默认 /swagger-ui.html，静态链常见为 /swagger-ui/index.html
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: trace=%X{traceId:-} update=%X{updateId:-} query=%X{queryId:-} cmd=%X{command:-} %5p
