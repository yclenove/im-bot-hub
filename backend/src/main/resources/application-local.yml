# =============================================================================
# 本地开发（local）— 连接本机 MySQL
# Local profile — connect to MySQL on this machine
#
# 激活方式 / Activate:
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
#   或环境变量：SPRING_PROFILES_ACTIVE=local
#
# 请先在本机创建库 tg_query_meta（或改下方 url 库名），再启动应用跑 Flyway。
# Create database tg_query_meta locally first, then start the app for Flyway.
#
# MySQL 5.7：父 POM 默认 Flyway 9 CE 会拒绝连接；本项目在 pom 中覆盖为 Flyway 10 CE。
# MySQL 5.7: default Flyway 9 CE refuses this server; this project pins Flyway 10 CE in pom.xml.
# 若库中已有对象但尚未存在 flyway_schema_history（例如手工/MCP 建表），需 baseline 后再 migrate。
# If objects exist without flyway_schema_history (e.g. manual/MCP DDL), baseline before migrate.
#
# v2rayN：HTTP 入站一般为「本地 socks 端口 +1」（图中 socks=10808 时 HTTP 为 10809），供本机 Java 访问 Telegram API。
# =============================================================================
spring:
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/tg_query_meta?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: change-me-local

app:
  telegram:
    outbound-proxy:
      host: 127.0.0.1
      port: 10809
