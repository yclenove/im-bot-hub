# =============================================================================
# Nginx：api.hongtaiglobal.com（ HTTPS + 管理端静态 + /api 反代 + Webhook ）
# 使用方式：合并进该站点「网站 → 设置 → 配置文件」的 server { }，或 include。
#
# 【务必按你的环境修改】
# 1) ssl_certificate：证书路径
#    - Certbot 常见：/etc/letsencrypt/live/api.hongtaiglobal.com/fullchain.pem
#    - 宝塔面板在「网站 → SSL」申请后，可到该站点目录或面板提示路径查看（可能非 letsencrypt）
# 2) root：admin-ui 构建产物 dist 所在目录（须含 index.html）
#    - 下文默认宝塔常见：/www/wwwroot/api.hongtaiglobal.com
#    - 若用文档 /opt 部署则改为：/opt/telegram-query-bot/admin-ui/dist
# 3) proxy_pass 端口：与后端 server.port 一致，默认 18089
# =============================================================================

server {
    listen 443 ssl http2;
    server_name api.hongtaiglobal.com;

    ssl_certificate     /etc/letsencrypt/live/api.hongtaiglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hongtaiglobal.com/privkey.pem;

    # 管理端 SPA（Vue 构建产物）
    root /www/wwwroot/api.hongtaiglobal.com;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name api.hongtaiglobal.com;
    return 301 https://$host$request_uri;
}
