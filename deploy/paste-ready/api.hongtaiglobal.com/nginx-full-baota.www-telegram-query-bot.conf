# =============================================================================
# 宝塔面板 — api.hongtaiglobal.com — 完整站点配置（可直接覆盖「网站 → 配置文件」）
#
# 前端 root：/www/wwwroot/telegram-query-bot/www  ← admin-ui/dist 全部文件放这里
# 后端反代：127.0.0.1:18089（与 Java 项目端口一致）
#
# 使用前：在面板为该域名申请 SSL；保存前在 SSH 执行 nginx -t
#
# 【若 nginx -t 报错 unknown log format "site_total"】
# 原因：extension 下 site_total.conf 引用了宝塔在 http{} 里定义的 log_format site_total，主配置缺失或未加载时会失败。
# 处理任选其一：
#   (1) 保持下面 extension 的 include **注释掉**（可正常跑站；宝塔「站点统计」里依赖该项的日志可能不完整）。
#   (2) 在 SSH 检查：grep -n "log_format site_total" /www/server/nginx/conf/nginx.conf
#       若没有，在面板「软件商店 → Nginx → 修复」或对比同版本宝塔默认 nginx.conf 补全 http{} 内的 log_format。
#   (3) 编辑 extension/api.hongtaiglobal.com/site_total.conf，把 access_log 中的格式名由 site_total 改为 combined（权宜之计）。
# =============================================================================

server
{
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name api.hongtaiglobal.com;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/telegram-query-bot/www;

    # 若主配置已正确定义 log_format site_total，可取消下一行注释以启用宝塔 extension（站点流量统计等）
    # include /www/server/panel/vhost/nginx/extension/api.hongtaiglobal.com/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/api.hongtaiglobal.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    ssl_certificate     /www/server/panel/vhost/cert/api.hongtaiglobal.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.hongtaiglobal.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;
    #SSL-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/html_api.hongtaiglobal.com.conf;
    #REWRITE-END

    # ---- telegram-query-bot：API / Webhook / OpenAPI / Actuator ----
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /v3/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /swagger-ui/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /actuator/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }

    # 禁止访问的敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log  /www/wwwlogs/api.hongtaiglobal.com.log;
    error_log   /www/wwwlogs/api.hongtaiglobal.com.error.log;
}
