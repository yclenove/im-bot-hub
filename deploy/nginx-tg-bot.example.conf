# Nginx 示例：HTTPS 终止 + 前端静态站点 + 反向代理后端 API
# 将「你的域名」「证书路径」「前端 dist 路径」换成实际值后 include 到 sites-enabled。
#
# 后端监听 127.0.0.1:18089（与 application.yml 中 server.port 一致）
# 前端为 admin-ui 的 npm run build 产出目录（例如 /opt/telegram-query-bot/admin-ui/dist）

server {
    listen 443 ssl http2;
    server_name 你的域名.example.com;

    ssl_certificate     /etc/letsencrypt/live/你的域名.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/你的域名.example.com/privkey.pem;

    # 管理端 SPA（Vue）
    root /opt/telegram-query-bot/admin-ui/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- telegram-relay（Go，本机 8780）：管理 API + 入队 ----
    location ^~ /api/v2/ {
        proxy_pass http://127.0.0.1:8780;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- relay 管理台静态 SPA（由 relay 的 ADMIN_STATIC_DIR 提供）----
    # 无尾斜杠的 /relay 不会命中 location ^~ /relay/，会落到下方 location / 的 try_files，误返回根站 query 的 index.html → 白屏。
    location = /relay {
        return 301 /relay/;
    }
    location ^~ /relay/ {
        proxy_pass http://127.0.0.1:8780/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API、Webhook、Swagger UI、OpenAPI JSON（/v3/api-docs 及其子路径）
    location /api/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        proxy_pass http://127.0.0.1:18089;
        proxy_set_header Host $host;
        # 生产建议仅内网或加鉴权暴露 actuator
    }
}

server {
    listen 80;
    server_name 你的域名.example.com;
    return 301 https://$host$request_uri;
}
