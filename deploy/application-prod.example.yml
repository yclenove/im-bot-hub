# 生产环境示例（复制为 application-prod.yml 或以外部配置挂载，勿把真实密码提交到 Git）
# 启动: java -jar app.jar --spring.profiles.active=prod
# 也可用环境变量覆盖 spring.datasource.* / app.security.* 等

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/tg_query_meta?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: tg_meta
    password: '请替换为强密码'
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

# 管理端浏览器来源（HTTPS 域名），按实际修改
app:
  cors:
    allowed-origins:
      - https://你的域名.example.com
  security:
    admin:
      username: admin
      password: '请替换为强密码'
  encryption:
    # 建议配置：32 字节 AES 密钥的 Base64，用于加密数据源密码落库
    secret-key-base64: ''
