global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'im-bot-hub'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:18089']
        labels:
          app: 'im-bot-hub'
    scrape_interval: 10s
