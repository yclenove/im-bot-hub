name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docs consistency
        shell: pwsh
        run: ./scripts/dev/check-docs.ps1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Backend tests
        run: mvn -q -f backend/pom.xml test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Admin UI build
        working-directory: admin-ui
        run: |
          npm ci
          npm run build
