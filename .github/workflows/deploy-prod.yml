name: Deploy Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build backend jar
        run: mvn -q -f backend/pom.xml -DskipTests package

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Build admin-ui
        working-directory: admin-ui
        run: |
          npm ci
          npm run build

      - name: Prepare artifacts
        shell: bash
        run: |
          cp backend/target/telegram-query-bot-*.jar backend/target/telegram-query-bot.jar
          tar -czf admin-ui-dist.tgz -C admin-ui/dist .

      - name: Upload artifacts and deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_PORT }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "backend/target/telegram-query-bot.jar,admin-ui-dist.tgz,deploy/deploy-prod.sh"
          target: "${{ secrets.PROD_RELEASE_DIR }}/${{ github.sha }}"
          strip_components: 0

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_PORT }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            chmod +x "${{ secrets.PROD_RELEASE_DIR }}/${{ github.sha }}/deploy/deploy-prod.sh"
            "${{ secrets.PROD_RELEASE_DIR }}/${{ github.sha }}/deploy/deploy-prod.sh" \
              "${{ secrets.PROD_RELEASE_DIR }}/${{ github.sha }}" \
              "${{ secrets.PROD_APP_DIR }}" \
              "${{ secrets.PROD_WEB_DIR }}" \
              "${{ secrets.PROD_RESTART_CMD }}" \
              "${{ secrets.PROD_HEALTHCHECK_URL }}" \
              "${{ secrets.PROD_JAR_NAME }}"
